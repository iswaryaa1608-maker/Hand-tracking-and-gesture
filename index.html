<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Particle Gesture Control — Real-Time 3D Hand Tracking</title>
  <meta name="description" content="Interactive 3D particle system controlled by hand gestures via webcam. Switch between heart, flower, Saturn, Buddha, and fireworks shapes.">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      overflow: hidden;
      background: #06060f;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
      color: #fff;
      -webkit-font-smoothing: antialiased;
    }

    /* ---- Three.js Canvas ---- */
    #three-canvas {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      display: block;
    }

    /* ---- Hidden video for MediaPipe ---- */
    #webcam { display: none; }

    /* ---- Webcam Preview ---- */
    #webcam-preview {
      position: fixed;
      bottom: 20px; left: 20px;
      width: 200px;
      border-radius: 14px;
      overflow: hidden;
      border: 1.5px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 10;
      background: #000;
      transition: border-color 0.4s ease;
    }
    #webcam-preview.tracking {
      border-color: rgba(68, 255, 136, 0.35);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5), 0 0 20px rgba(68,255,136,0.08);
    }
    #preview-canvas {
      width: 100%;
      display: block;
      transform: scaleX(-1);
    }

    /* ---- Control Panel ---- */
    #control-panel {
      position: fixed;
      top: 20px; right: 20px;
      width: 210px;
      background: rgba(12, 12, 28, 0.65);
      backdrop-filter: blur(24px) saturate(1.4);
      -webkit-backdrop-filter: blur(24px) saturate(1.4);
      border-radius: 18px;
      border: 1px solid rgba(255,255,255,0.08);
      padding: 20px 16px;
      z-index: 10;
      box-shadow: 0 12px 48px rgba(0,0,0,0.4);
    }

    .panel-section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }

    .template-btn {
      display: block;
      width: 100%;
      padding: 9px 12px;
      margin-bottom: 5px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.06);
      border-radius: 10px;
      color: rgba(255,255,255,0.7);
      font-family: 'Inter', sans-serif;
      font-size: 12.5px;
      font-weight: 400;
      cursor: pointer;
      transition: all 0.25s ease;
      text-align: left;
      outline: none;
    }
    .template-btn:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(255,255,255,0.15);
      color: #fff;
    }
    .template-btn.active {
      background: rgba(120, 80, 255, 0.2);
      border-color: rgba(120, 80, 255, 0.45);
      color: #fff;
      font-weight: 500;
    }

    .panel-divider {
      height: 1px;
      background: rgba(255,255,255,0.06);
      margin: 14px 0;
    }

    .color-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .color-row label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.35);
    }
    input[type="color"] {
      -webkit-appearance: none;
      appearance: none;
      width: 32px; height: 32px;
      border: none; border-radius: 50%;
      cursor: pointer;
      background: none;
      padding: 0;
    }
    input[type="color"]::-webkit-color-swatch-wrapper { padding: 2px; }
    input[type="color"]::-webkit-color-swatch {
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 50%;
    }
    input[type="color"]::-moz-color-swatch {
      border: 2px solid rgba(255,255,255,0.15);
      border-radius: 50%;
    }

    #hand-status {
      display: flex;
      align-items: center;
      gap: 7px;
      margin-top: 14px;
    }
    #status-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #ff4455;
      transition: all 0.35s ease;
      flex-shrink: 0;
    }
    #status-dot.active {
      background: #44ff88;
      box-shadow: 0 0 10px rgba(68, 255, 136, 0.6);
    }
    #status-text {
      font-size: 10.5px;
      color: rgba(255,255,255,0.4);
      line-height: 1.3;
    }

    /* ---- Loading Overlay ---- */
    #loading-overlay {
      position: fixed;
      inset: 0;
      background: #06060f;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 200;
      transition: opacity 0.6s ease;
    }
    .spinner {
      width: 36px; height: 36px;
      border: 2.5px solid rgba(255,255,255,0.08);
      border-top-color: rgba(120, 80, 255, 0.85);
      border-radius: 50%;
      animation: spin 0.9s linear infinite;
      margin-bottom: 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    #loading-overlay p {
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      text-align: center;
      max-width: 280px;
      line-height: 1.5;
    }
  </style>
</head>
<body>

  <!-- Loading Overlay -->
  <div id="loading-overlay">
    <div class="spinner"></div>
    <p id="loading-msg">Initializing hand tracking…</p>
  </div>

  <!-- Three.js Canvas -->
  <canvas id="three-canvas"></canvas>

  <!-- Hidden webcam video element -->
  <video id="webcam" playsinline></video>

  <!-- Webcam Preview -->
  <div id="webcam-preview">
    <canvas id="preview-canvas" width="320" height="240"></canvas>
  </div>

  <!-- Control Panel -->
  <div id="control-panel">
    <div class="panel-section-label">Templates</div>
    <button class="template-btn active" data-template="heart" id="btn-heart">❤️&ensp;Heart</button>
    <button class="template-btn" data-template="flower" id="btn-flower">🌸&ensp;Flower</button>
    <button class="template-btn" data-template="saturn" id="btn-saturn">🪐&ensp;Saturn</button>
    <button class="template-btn" data-template="buddha" id="btn-buddha">🧘&ensp;Buddha</button>
    <button class="template-btn" data-template="fireworks" id="btn-fireworks">🎆&ensp;Fireworks</button>

    <div class="panel-divider"></div>

    <div class="color-row">
      <label for="color-picker">Colour</label>
      <input type="color" id="color-picker" value="#7850ff">
    </div>

    <div id="hand-status">
      <div id="status-dot"></div>
      <span id="status-text">No hands detected</span>
    </div>
  </div>

  <!-- Three.js (r128 — supports global OrbitControls) -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>

  <!-- MediaPipe Hands + Camera Utils -->
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/hands.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils@0.3.1675466862/camera_utils.js" crossorigin="anonymous"></script>

  <script>
  (function () {
    'use strict';

    /* ======================================================
       CONFIGURATION
    ====================================================== */
    const PARTICLE_COUNT  = 3000;
    const LERP_SPEED      = 0.035;
    const SCALE_LERP      = 0.06;
    const DEFAULT_HEX     = '#7850ff';
    const PI2             = Math.PI * 2;

    /* ======================================================
       MUTABLE STATE
    ====================================================== */
    let currentTemplate = 'heart';
    let currentHex      = DEFAULT_HEX;
    let handTension     = 0;        // 0 = fist, 1 = open palm
    let targetScale     = 1.0;
    let liveScale       = 1.0;
    let handsDetected   = false;
    let elapsed         = 0;
    let lastFrame       = performance.now();

    let targetPos = new Float32Array(PARTICLE_COUNT * 3);

    /* ======================================================
       THREE.JS — SCENE
    ====================================================== */
    const canvas   = document.getElementById('three-canvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x06060f);
    scene.fog = new THREE.FogExp2(0x06060f, 0.035);

    const camera = new THREE.PerspectiveCamera(
      55, window.innerWidth / window.innerHeight, 0.1, 100
    );
    camera.position.set(0, 0.5, 7);

    const controls = new THREE.OrbitControls(camera, canvas);
    controls.enableDamping  = true;
    controls.dampingFactor  = 0.06;
    controls.enablePan      = false;
    controls.minDistance     = 3;
    controls.maxDistance     = 18;
    controls.autoRotate     = true;
    controls.autoRotateSpeed = 0.6;

    /* ======================================================
       PARTICLE SPRITE TEXTURE
    ====================================================== */
    const spriteCanvas = document.createElement('canvas');
    spriteCanvas.width = spriteCanvas.height = 64;
    const sCtx = spriteCanvas.getContext('2d');
    const g = sCtx.createRadialGradient(32, 32, 0, 32, 32, 32);
    g.addColorStop(0,   'rgba(255,255,255,1)');
    g.addColorStop(0.15,'rgba(255,255,255,0.85)');
    g.addColorStop(0.45,'rgba(255,255,255,0.3)');
    g.addColorStop(1,   'rgba(255,255,255,0)');
    sCtx.fillStyle = g;
    sCtx.fillRect(0, 0, 64, 64);
    const spriteTex = new THREE.CanvasTexture(spriteCanvas);

    /* ======================================================
       PARTICLE GEOMETRY + MATERIAL
    ====================================================== */
    const geo      = new THREE.BufferGeometry();
    const posArr   = new Float32Array(PARTICLE_COUNT * 3);
    const colArr   = new Float32Array(PARTICLE_COUNT * 3);

    // Scatter initial positions randomly
    for (let i = 0; i < PARTICLE_COUNT * 3; i++) posArr[i] = (Math.random() - 0.5) * 6;

    geo.setAttribute('position', new THREE.BufferAttribute(posArr, 3));
    geo.setAttribute('color',    new THREE.BufferAttribute(colArr, 3));

    const mat = new THREE.PointsMaterial({
      size: 0.09,
      map: spriteTex,
      vertexColors: true,
      transparent: true,
      opacity: 0.92,
      blending: THREE.AdditiveBlending,
      depthWrite: false,
      sizeAttenuation: true
    });

    const pointCloud = new THREE.Points(geo, mat);
    scene.add(pointCloud);

    /* ======================================================
       SHAPE GENERATORS
       Each returns a Float32Array of length PARTICLE_COUNT*3
    ====================================================== */

    function generateHeart(n) {
      const p = new Float32Array(n * 3);
      for (let i = 0; i < n; i++) {
        const t = Math.random() * PI2;
        const r = 0.15 + Math.random() * 0.85;
        let x = 16 * Math.pow(Math.sin(t), 3);
        let y = 13 * Math.cos(t) - 5 * Math.cos(2*t) - 2 * Math.cos(3*t) - Math.cos(4*t);
        x *= 0.1 * r;
        y *= 0.1 * r;
        const d = Math.max(0.08, 1 - Math.sqrt(x*x + y*y) / 2.2);
        const z = (Math.random() - 0.5) * d * 1.4;
        p[i*3] = x;  p[i*3+1] = y;  p[i*3+2] = z;
      }
      return p;
    }

    function generateFlower(n) {
      const p = new Float32Array(n * 3);
      const numPetals  = 7;
      const centerN    = Math.floor(n * 0.12);
      // Centre
      for (let i = 0; i < centerN; i++) {
        const r   = Math.random() * 0.45;
        const th  = Math.random() * PI2;
        const phi = Math.acos(2 * Math.random() - 1);
        p[i*3]   = r * Math.sin(phi) * Math.cos(th);
        p[i*3+1] = r * Math.sin(phi) * Math.sin(th);
        p[i*3+2] = r * Math.cos(phi);
      }
      // Petals
      for (let i = centerN; i < n; i++) {
        const petal  = Math.floor(Math.random() * numPetals);
        const base   = (petal / numPetals) * PI2;
        const t      = Math.random();
        const width  = Math.sin(t * Math.PI) * 0.65;
        const len    = 2.2;
        const lx     = t * len;
        const ly     = (Math.random() - 0.5) * width;
        const lz     = (Math.random() - 0.5) * 0.12 + Math.sin(t * Math.PI) * 0.25;
        p[i*3]   = lx * Math.cos(base) - ly * Math.sin(base);
        p[i*3+1] = lx * Math.sin(base) + ly * Math.cos(base);
        p[i*3+2] = lz;
      }
      return p;
    }

    function generateSaturn(n) {
      const p = new Float32Array(n * 3);
      const sphereN = Math.floor(n * 0.52);
      // Planet sphere
      for (let i = 0; i < sphereN; i++) {
        const th  = Math.random() * PI2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r   = 0.75 + Math.random() * 0.25;
        p[i*3]   = r * Math.sin(phi) * Math.cos(th);
        p[i*3+1] = r * Math.sin(phi) * Math.sin(th) * 0.88;
        p[i*3+2] = r * Math.cos(phi);
      }
      // Ring
      const tilt = 0.38;
      for (let i = sphereN; i < n; i++) {
        const th = Math.random() * PI2;
        const r  = 1.35 + Math.random() * 1.15;
        const y  = (Math.random() - 0.5) * 0.06;
        const rx = r * Math.cos(th);
        const rz = r * Math.sin(th);
        p[i*3]   = rx;
        p[i*3+1] = y * Math.cos(tilt) - rz * Math.sin(tilt);
        p[i*3+2] = y * Math.sin(tilt) + rz * Math.cos(tilt);
      }
      return p;
    }

    function generateBuddha(n) {
      const p = new Float32Array(n * 3);
      const profile = [
        [-2.3,2.3],[-2.0,2.5],[-1.7,2.3],[-1.4,2.0],
        [-1.1,1.75],[-0.8,1.45],[-0.5,1.25],[-0.2,1.1],
        [0.0,1.0],[0.2,0.95],[0.4,0.9],[0.6,0.85],
        [0.8,0.82],[1.0,1.05],[1.15,0.95],[1.25,0.78],
        [1.35,0.34],[1.42,0.34],
        [1.5,0.52],[1.7,0.62],[1.9,0.62],[2.1,0.56],
        [2.3,0.44],[2.5,0.28],[2.6,0.14],[2.7,0.06]
      ];
      const segs = profile.length - 1;
      for (let i = 0; i < n; i++) {
        const si = Math.floor(Math.random() * segs);
        const t  = Math.random();
        const y  = profile[si][0] + t * (profile[si+1][0] - profile[si][0]);
        const w  = profile[si][1] + t * (profile[si+1][1] - profile[si][1]);
        const angle = Math.random() * PI2;
        const rNorm = Math.sqrt(Math.random());
        const x  = Math.cos(angle) * rNorm * w;
        const z  = Math.sin(angle) * rNorm * w * 0.55;
        p[i*3] = x;  p[i*3+1] = y * 0.65;  p[i*3+2] = z;
      }
      return p;
    }

    function generateFireworks(n) {
      const p = new Float32Array(n * 3);
      const bursts = 5;
      const perBurst = Math.floor(n / bursts);
      const raysPerBurst = 24;
      const perRay = Math.floor(perBurst / raysPerBurst);

      let idx = 0;
      for (let b = 0; b < bursts; b++) {
        const cx = (Math.random() - 0.5) * 3.5;
        const cy = Math.random() * 2 - 0.5;
        const cz = (Math.random() - 0.5) * 2;
        const size = 0.7 + Math.random() * 1.3;

        for (let r = 0; r < raysPerBurst; r++) {
          const th  = Math.random() * PI2;
          const phi = Math.acos(2 * Math.random() - 1);
          const dx  = Math.sin(phi) * Math.cos(th);
          const dy  = Math.sin(phi) * Math.sin(th);
          const dz  = Math.cos(phi);

          for (let k = 0; k < perRay && idx < n; k++, idx++) {
            const t = Math.pow(Math.random(), 0.6) * size;
            p[idx*3]   = cx + dx * t;
            p[idx*3+1] = cy + dy * t;
            p[idx*3+2] = cz + dz * t;
          }
        }
      }
      // Fill remaining
      for (; idx < n; idx++) {
        p[idx*3]   = (Math.random()-0.5)*3;
        p[idx*3+1] = (Math.random()-0.5)*3;
        p[idx*3+2] = (Math.random()-0.5)*2;
      }
      return p;
    }

    const generators = {
      heart: generateHeart,
      flower: generateFlower,
      saturn: generateSaturn,
      buddha: generateBuddha,
      fireworks: generateFireworks
    };

    /* ======================================================
       TEMPLATE + COLOUR SETTERS
    ====================================================== */
    function setTemplate(name) {
      if (!generators[name]) return;
      currentTemplate = name;
      targetPos = generators[name](PARTICLE_COUNT);
      document.querySelectorAll('.template-btn').forEach(b =>
        b.classList.toggle('active', b.dataset.template === name)
      );
    }

    // Stable per-particle random seeds for colour variation
    const cSeeds = new Float32Array(PARTICLE_COUNT * 3);
    for (let i = 0; i < cSeeds.length; i++) cSeeds[i] = Math.random();

    function applyColour(hex) {
      currentHex = hex;
      const base = new THREE.Color(hex);
      const hsl  = {};
      base.getHSL(hsl);
      const tmp  = new THREE.Color();
      for (let i = 0; i < PARTICLE_COUNT; i++) {
        const h = ((hsl.h + (cSeeds[i*3]   - 0.5) * 0.14) % 1 + 1) % 1;
        const s = Math.max(0, Math.min(1, hsl.s + (cSeeds[i*3+1] - 0.5) * 0.16));
        const l = Math.max(0.12, Math.min(0.92, hsl.l + (cSeeds[i*3+2] - 0.5) * 0.22));
        tmp.setHSL(h, s, l);
        colArr[i*3]   = tmp.r;
        colArr[i*3+1] = tmp.g;
        colArr[i*3+2] = tmp.b;
      }
      geo.attributes.color.needsUpdate = true;
    }

    /* ======================================================
       MEDIAPIPE HAND TRACKING
    ====================================================== */
    const videoEl       = document.getElementById('webcam');
    const prevCanvas    = document.getElementById('preview-canvas');
    const prevCtx       = prevCanvas.getContext('2d');
    const previewWrap   = document.getElementById('webcam-preview');
    const statusDot     = document.getElementById('status-dot');
    const statusText    = document.getElementById('status-text');
    const loadingOverlay= document.getElementById('loading-overlay');
    const loadingMsg    = document.getElementById('loading-msg');

    function tensionFromLandmarks(lm) {
      // Palm = average of wrist + MCP joints
      const palmIdx = [0, 5, 9, 13, 17];
      let px = 0, py = 0, pz = 0;
      for (const j of palmIdx) { px += lm[j].x; py += lm[j].y; pz += lm[j].z; }
      px /= 5; py /= 5; pz /= 5;
      // Fingertip distances
      const tips = [4, 8, 12, 16, 20];
      let sum = 0;
      for (const j of tips) {
        const dx = lm[j].x - px, dy = lm[j].y - py, dz = lm[j].z - pz;
        sum += Math.sqrt(dx*dx + dy*dy + dz*dz);
      }
      const avg = sum / 5;
      return Math.max(0, Math.min(1, (avg - 0.06) / 0.32));
    }

    function onHandResults(results) {
      prevCtx.clearRect(0, 0, prevCanvas.width, prevCanvas.height);
      prevCtx.drawImage(results.image, 0, 0, prevCanvas.width, prevCanvas.height);

      if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
        handsDetected = true;
        let total = 0;
        for (const landmarks of results.multiHandLandmarks) {
          total += tensionFromLandmarks(landmarks);
          // Draw landmark dots
          for (const lm of landmarks) {
            prevCtx.beginPath();
            prevCtx.arc(lm.x * prevCanvas.width, lm.y * prevCanvas.height, 2.5, 0, PI2);
            prevCtx.fillStyle = '#44ff88';
            prevCtx.fill();
          }
          // Draw connections (thumb, index, etc.)
          const conns = [
            [0,1],[1,2],[2,3],[3,4],
            [0,5],[5,6],[6,7],[7,8],
            [5,9],[9,10],[10,11],[11,12],
            [9,13],[13,14],[14,15],[15,16],
            [13,17],[17,18],[18,19],[19,20],[0,17]
          ];
          prevCtx.strokeStyle = 'rgba(68,255,136,0.35)';
          prevCtx.lineWidth = 1;
          for (const [a, b] of conns) {
            prevCtx.beginPath();
            prevCtx.moveTo(landmarks[a].x * prevCanvas.width, landmarks[a].y * prevCanvas.height);
            prevCtx.lineTo(landmarks[b].x * prevCanvas.width, landmarks[b].y * prevCanvas.height);
            prevCtx.stroke();
          }
        }
        handTension = total / results.multiHandLandmarks.length;
        statusDot.classList.add('active');
        previewWrap.classList.add('tracking');
        const count = results.multiHandLandmarks.length;
        statusText.textContent = `${count} hand${count > 1 ? 's' : ''} · tension ${(handTension * 100)|0}%`;
      } else {
        handsDetected = false;
        statusDot.classList.remove('active');
        previewWrap.classList.remove('tracking');
        statusText.textContent = 'No hands detected';
      }
    }

    async function initHandTracking() {
      // Check library availability
      if (typeof Hands === 'undefined') {
        console.error('MediaPipe Hands library failed to load.');
        loadingMsg.textContent = 'MediaPipe failed to load. Running in demo mode.';
        setTimeout(hideLoading, 2000);
        return;
      }
      if (typeof Camera === 'undefined') {
        console.error('MediaPipe Camera Utils library failed to load.');
        loadingMsg.textContent = 'Camera utils failed to load. Running in demo mode.';
        setTimeout(hideLoading, 2000);
        return;
      }

      try {
        const hands = new Hands({
          locateFile: file => `https://cdn.jsdelivr.net/npm/@mediapipe/hands@0.4.1675469240/${file}`
        });
        hands.setOptions({
          maxNumHands: 2,
          modelComplexity: 1,
          minDetectionConfidence: 0.6,
          minTrackingConfidence: 0.5
        });
        hands.onResults(onHandResults);

        const cam = new Camera(videoEl, {
          onFrame: async () => { await hands.send({ image: videoEl }); },
          width: 640,
          height: 480
        });
        await cam.start();
        console.log('✔ Hand tracking initialised.');
        hideLoading();
      } catch (err) {
        console.error('Hand tracking init error:', err);
        loadingMsg.textContent = 'Camera access denied or unavailable.\nRunning in demo mode (no hand input).';
        document.querySelector('.spinner').style.display = 'none';
        setTimeout(hideLoading, 2500);
      }
    }

    function hideLoading() {
      loadingOverlay.style.opacity = '0';
      setTimeout(() => { loadingOverlay.style.display = 'none'; }, 600);
    }

    /* ======================================================
       UI EVENT HANDLERS
    ====================================================== */
    document.querySelectorAll('.template-btn').forEach(btn => {
      btn.addEventListener('click', () => setTemplate(btn.dataset.template));
    });

    document.getElementById('color-picker').addEventListener('input', e => {
      applyColour(e.target.value);
    });

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ======================================================
       ANIMATION LOOP
    ====================================================== */
    function animate(now) {
      requestAnimationFrame(animate);
      const dt = Math.min((now - lastFrame) / 1000, 0.05);
      lastFrame = now;
      elapsed += dt;

      controls.update();

      // ---- Scale from hand tension ----
      if (handsDetected) {
        targetScale = 0.35 + handTension * 1.65;   // 0.35 … 2.0
      } else {
        targetScale = 1.0 + Math.sin(elapsed * 0.7) * 0.12;  // gentle breathing
      }
      liveScale += (targetScale - liveScale) * SCALE_LERP;
      pointCloud.scale.set(liveScale, liveScale, liveScale);

      // ---- Lerp positions toward targets ----
      const pA = geo.attributes.position.array;
      for (let i = 0; i < PARTICLE_COUNT * 3; i++) {
        pA[i] += (targetPos[i] - pA[i]) * LERP_SPEED;
      }

      // ---- Idle micro-motion when no hands ----
      if (!handsDetected) {
        for (let i = 0; i < PARTICLE_COUNT; i++) {
          const off = i * 0.007;
          pA[i*3]   += Math.sin(elapsed * 0.4 + off) * 0.0006;
          pA[i*3+1] += Math.cos(elapsed * 0.35 + off * 1.3) * 0.0006;
          pA[i*3+2] += Math.sin(elapsed * 0.45 + off * 0.7) * 0.0004;
        }
      }

      geo.attributes.position.needsUpdate = true;
      renderer.render(scene, camera);
    }

    /* ======================================================
       BOOTSTRAP
    ====================================================== */
    setTemplate('heart');
    applyColour(DEFAULT_HEX);
    requestAnimationFrame(animate);
    initHandTracking();

  })();
  </script>
</body>
</html>
